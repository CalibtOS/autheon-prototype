    <script type="text/babel" data-presets="env,react">
      const { useState, useEffect } = React;
      const demoDriver = () => AuthStore.DEMO_DRIVER;

      function resolvePwaHref() {
        return "/pwa/";
      }

      async function openPwaSurface(event, t) {
        if (event) event.preventDefault();
        const origin = window.location.origin;
        const candidates = [
          `${origin}/pwa/`,
          new URL("../../pwa/", window.location.href).href,
        ];
        for (const raw of candidates) {
          try {
            const href = raw.endsWith("/") ? raw : `${raw}/`;
            const probe = new URL("manifest.webmanifest", href).href;
            const res = await fetch(probe, { cache: "no-store" });
            if (res.ok) {
              (window.top || window).location.href = href;
              return;
            }
          } catch (_) {
            /* try next candidate */
          }
        }
        window.alert(t("pwaServeFromRootHint"));
      }

      // =====================================================================
      // DRIVER PWA APP
      // =====================================================================
      function DriverApp() {
        const store = useAuthStore();
        const { t } = useI18n();
        const [tab, setTab] = useState("portal");
        const [filters, setFilters] = useState({});
        const [showFilter, setShowFilter] = useState(false);
        const [activeJob, setActiveJob] = useState(null); // {id, mode}
        const [acceptModal, setAcceptModal] = useState(null);
        const [reportProblemJob, setReportProblemJob] = useState(null);
        const [pendingNotice, setPendingNotice] = useState(null);
        const [markPerformedJobId, setMarkPerformedJobId] = useState(null);
        const [probationLimitModal, setProbationLimitModal] = useState(null);
        const [overlapConfirm, setOverlapConfirm] = useState(null);
        const [banner, setBanner] = useState(null);
        const [showNotifications, setShowNotifications] = useState(false);

        const handleOpenJob = (j, fromTab = tab) => {
          const portalLocked =
            j.status === "published" &&
            !store.isAccepted(j.id) &&
            !store.isPerformed(j.id);
          const mode = portalLocked ? "locked" : "unlocked";
          setActiveJob({ id: j.id, mode, fromTab });
        };
        const back = () => {
          const returnTab = activeJob?.fromTab || tab;
          setActiveJob(null);
          if (returnTab) setTab(returnTab);
        };
        const backToMarketplace = () => {
          setActiveJob(null);
          setTab("portal");
        };

        const job = activeJob ? store.getJob(activeJob.id) : null;

        let body;
        if (activeJob && job) {
          if (activeJob.mode === "locked") {
            body = (
              <JobLocked
                job={job}
                onBack={back}
                onBackToMarketplace={backToMarketplace}
                onAccept={() => setAcceptModal(job)}
              />
            );
          } else {
            body = (
              <JobUnlocked
                job={job}
                onBack={back}
                onBackToMarketplace={backToMarketplace}
                onReportProblem={() => setReportProblemJob(job)}
                onPerform={() => setMarkPerformedJobId(job.id)}
              />
            );
          }
        } else if (tab === "portal") {
          body = (
            <Portal
              filters={filters}
              setFilters={setFilters}
              openFilter={() => setShowFilter(true)}
              onOpenJob={handleOpenJob}
              onOpenNotifications={() => setShowNotifications(true)}
              notificationsOpen={showNotifications}
            />
          );
        } else if (tab === "mine") {
          body = (
            <MyJobs
              onOpen={(j) =>
                setActiveJob({ id: j.id, mode: "unlocked", fromTab: "mine" })
              }
            />
          );
        } else if (tab === "info") {
          body = <Infopoint />;
        } else {
          body = <ProfilePaneFull />;
        }

        return (
          <div className="phone-shell">
            <div className="pwa-tag">{t("pwaTag")}</div>
            <div className="phone">
              <div className="notch"></div>
              <div className="phone-screen">
                <PhoneStatusBar />
                <div
                  style={{
                    flex: 1,
                    display: "flex",
                    flexDirection: "column",
                    minHeight: 0,
                  }}
                >
                  {banner && (
                    <div
                      className={`banner ${
                        typeof banner === "object" && banner.tone === "success"
                          ? "banner-success"
                          : "banner-warn"
                      }`}
                      role="alert"
                    >
                      {typeof banner === "object" ? banner.text : banner}
                      <button
                        type="button"
                        className="btn xs touch-target"
                        style={{ marginLeft: 10 }}
                        onClick={() => setBanner(null)}
                      >
                        {t("dismiss")}
                      </button>
                    </div>
                  )}
                  {body}
                </div>
                {!activeJob && (
                  <TabBar tab={tab} setTab={setTab} />
                )}
                {showNotifications && (
                  <DriverNotificationsPane
                    onClose={() => setShowNotifications(false)}
                    onOpenJob={(job) => {
                      setShowNotifications(false);
                      handleOpenJob(job);
                    }}
                    onOpenInfopoint={() => {
                      setShowNotifications(false);
                      setTab("info");
                    }}
                  />
                )}
                {showFilter && (
                  <FilterSheet
                    filters={filters}
                    setFilters={setFilters}
                    onClose={() => setShowFilter(false)}
                  />
                )}
                {acceptModal && (
                  <AcceptanceModal
                    job={acceptModal}
                    onCancel={() => setAcceptModal(null)}
                    onConfirm={() => {
                      const tryAccept = (confirmOverlap) => {
                        const r = store.acceptJob(acceptModal.id, {
                          confirmSameDayOverlap: confirmOverlap,
                        });
                        const id = acceptModal.id;
                        if (!r.ok) {
                          if (r.reason === "same_day_overlap_confirm") {
                            setAcceptModal(null);
                            setOverlapConfirm({ jobId: id });
                            return;
                          }
                          setAcceptModal(null);
                          if (r.reason === "driver_restricted") {
                            setBanner({ tone: "warn", text: t("blockedDriverBody") });
                          } else if (r.reason === "probation_limit_reached") {
                            setProbationLimitModal({
                              limit: r.limit,
                              performedCount: r.performedCount,
                            });
                          } else {
                            setBanner({ tone: "warn", text: t("toastAssignedElsewhere") });
                          }
                          setActiveJob({ id, mode: "locked" });
                          return;
                        }
                        setAcceptModal(null);
                        setActiveJob({ id, mode: "unlocked" });
                      };
                      tryAccept(false);
                    }}
                  />
                )}
                {reportProblemJob && (
                  <ReportProblemSheet
                    job={reportProblemJob}
                    onClose={() => setReportProblemJob(null)}
                    onSubmit={(path, reason, msg, evidence) => {
                      const r =
                        path === "cancel"
                          ? store.reportProblemCancel(
                              reportProblemJob.id,
                              reason,
                              msg,
                            )
                          : store.reportProblemNotPerformable(
                              reportProblemJob.id,
                              reason,
                              msg,
                              evidence,
                            );
                      setReportProblemJob(null);
                      if (!r.ok) return;
                      setPendingNotice(path);
                      setActiveJob({ id: reportProblemJob.id, mode: "unlocked" });
                    }}
                  />
                )}
                {pendingNotice && (
                  <PendingNotice
                    kind={pendingNotice}
                    onClose={() => setPendingNotice(null)}
                  />
                )}
                {markPerformedJobId && store.getJob(markPerformedJobId) && (
                  <MarkPerformedSheet
                    job={store.getJob(markPerformedJobId)}
                    onClose={() => setMarkPerformedJobId(null)}
                  />
                )}
                {probationLimitModal && (
                  <ProbationLimitSheet
                    limitInfo={probationLimitModal}
                    onClose={() => setProbationLimitModal(null)}
                  />
                )}
                {overlapConfirm && (
                  <SameDayOverlapSheet
                    onCancel={() => {
                      setOverlapConfirm(null);
                      setActiveJob({ id: overlapConfirm.jobId, mode: "locked" });
                    }}
                    onConfirm={() => {
                      const id = overlapConfirm.jobId;
                      const r = store.acceptJob(id, {
                        confirmSameDayOverlap: true,
                      });
                      setOverlapConfirm(null);
                      if (!r.ok) {
                        if (r.reason === "probation_limit_reached") {
                          setProbationLimitModal({
                            limit: r.limit,
                            performedCount: r.performedCount,
                          });
                        } else if (r.reason === "driver_restricted") {
                          setBanner({ tone: "warn", text: t("blockedDriverBody") });
                        } else {
                          setBanner({ tone: "warn", text: t("toastAssignedElsewhere") });
                        }
                        setActiveJob({ id, mode: "locked" });
                        return;
                      }
                      setActiveJob({ id, mode: "unlocked" });
                    }}
                  />
                )}
              </div>
            </div>
          </div>
        );
      }

      // =====================================================================
      // ADMIN APP
      // =====================================================================
      function AdminApp() {
        const store = useAuthStore();
        const { t } = useI18n();
        const [section, setSection] = useState("overview"); // overview, detail, new, ...
        const [activeJob, setActiveJob] = useState(null);
        const [toast, setToast] = useState(null);
        const [freshId, setFreshId] = useState(null);
        const [newOrderForm, setNewOrderForm] = useState({});
        const [newOrderValid, setNewOrderValid] = useState(false);
        const [editingJobId, setEditingJobId] = useState(null);
        const [billingNav, setBillingNav] = useState(null);
        const [assignDialog, setAssignDialog] = useState(null);
        const [selectedMdrId, setSelectedMdrId] = useState(null);

        const clearBillingNav = () => setBillingNav(null);
        const openMasterDataRequest = (requestId) => {
          setSelectedMdrId(requestId || "");
          setSection("masterdata");
        };
        const closeAssignDialog = () => setAssignDialog(null);

        const confirmAssignDriver = (driverId, confirmationNote) => {
          if (!assignDialog?.jobId) return;
          const job = store.getJob(assignDialog.jobId);
          const r =
            assignDialog.mode === "reassign"
              ? store.reassignJob(assignDialog.jobId, driverId)
              : store.assignJob(assignDialog.jobId, driverId, {
                  confirmationNote,
                });
          if (!r.ok) {
            showToast(
              assignDialog.mode === "reassign"
                ? t("reassignBlocked")
                : t("assignBlocked"),
              assignDriverErr(r, t),
            );
            return;
          }
          const name = r.driver?.name || job?.driver || "";
          const mode = assignDialog.mode;
          const afterAssign = assignDialog.afterAssign;
          closeAssignDialog();
          if (mode === "reassign") {
            showToast(
              t("jobReassigned", { driver: name }),
              t("assignedTour", { tour: job?.tour || "" }),
            );
          } else {
            showToast(
              t("assignedDriver", { driver: name }),
              t("assignedTour", { tour: job?.tour || "" }),
            );
            if (afterAssign === "back") onBack();
          }
        };
        const openFinancesForJob = (jobId) => {
          if (!store.getFeatureFlag("financeModule")) {
            showToast(t("adminFinanceModuleOff"), "");
            return;
          }
          setBillingNav({ jobId, openFinEdit: true });
          setSection("finance");
        };
        const openTourBillingForJob = (jobId) => {
          setBillingNav({ jobId, invoiceFilter: true });
          setSection("invoices");
        };

        const showToast = (msg, sub, action) => {
          setToast({ msg, sub, action });
          clearTimeout(window.__t);
          window.__t = setTimeout(() => setToast(null), 5000);
        };

        const saveNewOrderDraft = () => {
          const saved = store.saveDraft(newOrderForm || {});
          if (!saved || saved.error) {
            if (saved?.error === "within_schedule_cutoff") {
              showToast(
                t("adminScheduleCutoffBlocked", {
                  hours: saved.minHours || 1,
                }),
                t("adminScheduleOverrideHint"),
              );
            } else if (saved?.error === "cross_midnight_window") {
              showToast(
                t("adminScheduleSameDayWindowError"),
                saved.leg === "delivery"
                  ? t("newOrderDeliverySchedule")
                  : t("newOrderPickupSchedule"),
              );
            } else {
              showToast(
                t("adminToastUpdateFailed"),
                t("adminMasterDataSaveFailed"),
              );
            }
            return null;
          }
          return saved;
        };

        const onOpenJob = (j) => {
          setActiveJob(j);
          setSection("detail");
        };
        const onBack = () => {
          setSection("overview");
          setActiveJob(null);
          setEditingJobId(null);
        };

        const openNewJob = () => {
          setEditingJobId(null);
          setNewOrderForm({});
          setNewOrderValid(false);
          setSection("new");
        };

        const openEditDraft = (jobId) => {
          setEditingJobId(jobId);
          setNewOrderForm({});
          setNewOrderValid(false);
          setSection("new");
        };

        const cancelNewOrder = () => {
          if (editingJobId) {
            const j = store.getJob(editingJobId);
            setEditingJobId(null);
            if (j) {
              setActiveJob(j);
              setSection("detail");
              return;
            }
          }
          onBack();
        };

        // Chrome owns the single page title. Breadcrumbs only for drill-down.
        const sectionTitle = {
          overview: t("navJobs"),
          notifications: t("adminNotificationFeed"),
          masterdata: t("navMasterDataRequests"),
          drivers: t("navDrivers"),
          staff: t("navStaff"),
          customers: t("navCustomers"),
          addresses: t("navAddresses"),
          infopoint: t("navInfopoint"),
          invoices: t("navTourBilling"),
          finance: t("navFinance"),
          audit: t("navAuditLog"),
          features: t("navFeatures"),
        };
        const pageChrome = (() => {
          if (section === "new") {
            const editTour = editingJobId
              ? store.getJob(editingJobId)?.tour
              : null;
            return (
              <nav className="crumbs" aria-label="Breadcrumb">
                <button
                  type="button"
                  className="crumb-link"
                  onClick={cancelNewOrder}
                >
                  {t("navJobs")}
                </button>
                <span className="sep">/</span>
                <h1 className="admin-page-title">
                  {editTour
                    ? `${t("adminEditDraft")} · ${editTour}`
                    : t("navNewJob")}
                </h1>
              </nav>
            );
          }
          if (section === "detail" && activeJob)
            return (
              <nav className="crumbs" aria-label="Breadcrumb">
                <button type="button" className="crumb-link" onClick={onBack}>
                  {t("navJobs")}
                </button>
                <span className="sep">/</span>
                <h1 className="admin-page-title">
                  {t("tourNo")} {activeJob.tour}
                </h1>
              </nav>
            );
          return (
            <h1 className="admin-page-title">
              {sectionTitle[section] || t("navJobs")}
            </h1>
          );
        })();

        // Section actions stay in chrome (Jobs only for now)
        const topRight = (() => {
          if (section === "overview")
            return (
              <div className="admin-top-actions">
                <button
                  type="button"
                  className="btn"
                  onClick={() => {
                    const csv = store.exportJobsCsv();
                    const blob = new Blob([csv], {
                      type: "text/csv;charset=utf-8",
                    });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement("a");
                    a.href = url;
                    a.download = "autheon-jobs-export.csv";
                    a.click();
                    URL.revokeObjectURL(url);
                    showToast(t("exportGenerated"), t("exportGeneratedSub"));
                  }}
                >
                  <Ic.Down /> {t("exportCsvBtn")}
                </button>
                <button
                  type="button"
                  className="btn primary"
                  onClick={openNewJob}
                >
                  <Ic.Plus /> {t("navNewJob")}
                </button>
              </div>
            );
          return null;
        })();

        // body
        let body;
        if (section === "overview") {
          body = <Overview onOpen={onOpenJob} freshId={freshId} />;
        } else if (section === "detail" && activeJob) {
          // re-read from store in case status changed
          const fresh = store.getJob(activeJob.id) || activeJob;
          body = (
            <AdminDetail
              job={fresh}
              onBack={onBack}
              onPublish={() => {
                const r = store.publishJob(fresh.id);
                if (!r.ok)
                  showToast(t("publishBlocked"), t("publishBlockedSub"));
                else
                  showToast(
                    t("publishedTour", { tour: fresh.tour }),
                    t("publishedPortalVisible"),
                  );
              }}
              onRequestAssign={() =>
                setAssignDialog({ jobId: fresh.id, mode: "assign" })
              }
              onRequestReassign={() =>
                setAssignDialog({ jobId: fresh.id, mode: "reassign" })
              }
              onCancelled={(j) =>
                showToast(
                  t("cancelledTour", { tour: j.tour }),
                  t("cancelledSub"),
                )
              }
              onEdit={() => openEditDraft(fresh.id)}
              onEditFinances={() => openFinancesForJob(fresh.id)}
              onOpenTourBilling={() => openTourBillingForJob(fresh.id)}
              showToast={showToast}
            />
          );
        } else if (section === "new") {
          body = (
            <NewOrder
              editJobId={editingJobId}
              onCancel={cancelNewOrder}
              onFormChange={(f, v) => {
                setNewOrderForm(f);
                setNewOrderValid(v);
              }}
            />
          );
        } else if (section === "drivers") {
          body = <DriversPane showToast={showToast} />;
        } else if (section === "staff") {
          body = <StaffPane showToast={showToast} />;
        } else if (section === "customers") {
          body = <CustomersPane showToast={showToast} />;
        } else if (section === "addresses") {
          body = <AddressesPane showToast={showToast} />;
        } else if (section === "infopoint") {
          body = <InfopointPane showToast={showToast} />;
        } else if (section === "invoices") {
          body = (
            <TourBillingPane
              showToast={showToast}
              filterJobId={billingNav?.invoiceFilter ? billingNav.jobId : null}
              onClearFilter={clearBillingNav}
              onOpenJob={(jobId) => {
                const j = store.getJob(jobId);
                if (j) {
                  setActiveJob(j);
                  setSection("detail");
                  clearBillingNav();
                }
              }}
            />
          );
        } else if (
          section === "finance" &&
          store.getFeatureFlag("financeModule")
        ) {
          body = (
            <FinancePane
              showToast={showToast}
              initialJobId={billingNav?.openFinEdit ? billingNav.jobId : null}
              initialOpenEdit={!!billingNav?.openFinEdit}
              onNavConsumed={clearBillingNav}
              onOpenTourBilling={openTourBillingForJob}
            />
          );
        } else if (section === "audit") {
          body = <AuditPane showToast={showToast} />;
        } else if (section === "notifications") {
          body = (
            <NotificationFeedPane
              onReviewMasterDataRequest={openMasterDataRequest}
            />
          );
        } else if (section === "masterdata") {
          body = (
            <MasterDataRequestsPane
              showToast={showToast}
              initialRequestId={selectedMdrId}
              onOpenJob={(j) => {
                setActiveJob(j);
                setSection("detail");
              }}
            />
          );
        } else if (section === "features") {
          body = <FeaturesPane showToast={showToast} />;
        } else {
          const stubTitles = {
            customers: [
              t("navCustomers") || "Customers",
              t("adminCustomersDesc"),
            ],
            addresses: [t("navAddresses") || "Addresses", t("fullAddresses")],
            infopoint: [t("navInfopoint"), t("adminInfopointDesc")],
            invoices: [t("navTourBilling"), t("tourBillingDesc")],
            finance: [t("navFinance"), t("financeDesc")],
            audit: [t("navAuditLog"), t("auditDesc")],
          };
          const stubPair = stubTitles[section] || ["—", ""];
          body = <Stub title={stubPair[0]} desc={stubPair[1]} />;
        }

        // footer per section
        let footer = null;
        if (section === "overview") {
          const all = store.getJobs();
          footer = (
            <OverviewFooter
              filteredCount={all.length}
              totalCount={all.length}
            />
          );
        } else if (section === "detail" && activeJob) {
          const fresh = store.getJob(activeJob.id);
          footer = (
            <AdminDetailFooter
              job={fresh}
              showToast={showToast}
              onDuplicate={(j) => {
                const r = store.duplicateJob(j.id);
                if (!r.ok || !r.job) {
                  showToast(t("adminToastUpdateFailed"), "");
                  return;
                }
                openEditDraft(r.job.id);
                showToast(
                  t("adminDuplicatedToast"),
                  t("adminDuplicatedToastSub", { tour: r.job.tour }),
                );
              }}
              onPublish={() => {
                const r = store.publishJob(fresh.id);
                if (!r.ok)
                  showToast(t("publishBlocked"), t("publishBlockedDraftOnly"));
                else
                  showToast(
                    t("publishedTour", { tour: fresh.tour }),
                    t("driversNowSeePreview"),
                  );
              }}
              onRequestAssign={() =>
                setAssignDialog({ jobId: fresh.id, mode: "assign" })
              }
              onRequestReassign={() =>
                setAssignDialog({ jobId: fresh.id, mode: "reassign" })
              }
              onEdit={() => openEditDraft(fresh.id)}
              onRevertToDraft={() => {
                const fresh = store.getJob(activeJob.id);
                let overrideNote = "";
                const prePolicy = store.checkScheduleChangePolicy(fresh, {});
                if (
                  !prePolicy.ok &&
                  prePolicy.reason === "within_schedule_cutoff"
                ) {
                  const policies = store.getOperationalPolicies();
                  if (policies.allowPolicyOverrideWithAuditNote) {
                    overrideNote =
                      window.prompt(t("adminScheduleOverridePh"), "") || "";
                    if (overrideNote.trim().length < 10) {
                      showToast(
                        t("adminScheduleCutoffBlocked", {
                          hours: prePolicy.minHours || 1,
                        }),
                        t("adminScheduleOverrideHint"),
                      );
                      return;
                    }
                  } else {
                    showToast(
                      t("adminScheduleCutoffBlocked", {
                        hours: prePolicy.minHours || 1,
                      }),
                      t("adminScheduleOverrideHint"),
                    );
                    return;
                  }
                }
                const r = store.revertJobToDraft(fresh.id, {
                  overrideNote: overrideNote.trim(),
                });
                if (!r.ok) {
                  if (r.reason === "within_schedule_cutoff")
                    showToast(
                      t("adminScheduleCutoffBlocked", {
                        hours: r.minHours || 1,
                      }),
                      t("adminScheduleOverrideHint"),
                    );
                  else
                    showToast(
                      t("revertToDraftBlocked"),
                      t("revertToDraftBlockedSub"),
                    );
                } else
                  showToast(
                    t("revertedToDraftTour", { tour: fresh.tour }),
                    t("adminRevertToDraftSub"),
                  );
              }}
              onCancelled={(j) =>
                showToast(
                  t("cancelledTour", { tour: j.tour }),
                  t("cancelledSub"),
                )
              }
              onDeleteDraft={() => {
                const r = store.deleteDraftJob(fresh.id);
                if (!r.ok)
                  showToast(
                    t("deleteDraftBlocked"),
                    t("deleteDraftBlockedSub"),
                  );
                else {
                  showToast(
                    t("draftDeletedTour", { tour: r.tour || fresh.tour }),
                    t("adminDeleteDraftSub"),
                  );
                  onBack();
                }
              }}
            />
          );
        } else if (section === "new") {
          // Saved-draft + publish handlers via window store; pull form from window
          footer = (
            <NewOrderFooter
              form={newOrderForm}
              valid={newOrderValid}
              onCancel={cancelNewOrder}
              onSaveDraft={() => {
                const saved = saveNewOrderDraft();
                if (!saved) return;
                setFreshId(saved.id);
                setEditingJobId(null);
                showToast(
                  t("draftSavedTour", { tour: saved.tour }),
                  (saved.customer || saved.customerName || "—") +
                    " · " +
                    (saved.startPlz || "—") +
                    " → " +
                    (saved.endPlz || "—"),
                  { label: t("open"), run: () => onOpenJob(saved) },
                );
                setActiveJob(saved);
                setSection("detail");
              }}
              onPublish={() => {
                if (!newOrderValid) return;
                const saved = saveNewOrderDraft();
                if (!saved) return;
                const r = store.publishJob(saved.id);
                setFreshId(saved.id);
                setEditingJobId(null);
                if (!r.ok)
                  showToast(t("couldNotPublish"), t("publishBlockedDraftOnly"));
                else
                  showToast(
                    t("publishedTour", { tour: saved.tour }),
                    t("driversNowSeePreview"),
                  );
                onBack();
              }}
              onAssign={() => {
                if (!newOrderValid) return;
                const saved = saveNewOrderDraft();
                if (!saved) return;
                setFreshId(saved.id);
                setEditingJobId(null);
                setAssignDialog({
                  jobId: saved.id,
                  mode: "assign",
                  afterAssign: "back",
                });
              }}
            />
          );
        }

        return (
          <div className="admin">
            <AdminNav
              section={
                section === "detail" || section === "new"
                  ? "overview"
                  : section
              }
              setSection={(s) => {
                setSection(s);
                setActiveJob(null);
                if (s !== "finance" && s !== "invoices") clearBillingNav();
              }}
            />
            <div className="admin-main">
              <div className="admin-top">
                {pageChrome}
                {topRight}
              </div>
              <div className="admin-content">{body}</div>
              {footer && <div className="admin-foot">{footer}</div>}
              {assignDialog && (
                <AssignDriverDialog
                  open
                  mode={assignDialog.mode}
                  job={store.getJob(assignDialog.jobId)}
                  onClose={closeAssignDialog}
                  onConfirm={confirmAssignDriver}
                />
              )}
              {toast && (
                <div className="toast">
                  <span className="check">✓</span>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontWeight: 600 }}>{toast.msg}</div>
                    {toast.sub && <div className="sub">{toast.sub}</div>}
                  </div>
                  {toast.action && (
                    <button
                      className="btn xs"
                      style={{
                        background: "#fff",
                        color: "#000",
                        borderColor: "#fff",
                      }}
                      onClick={() => {
                        toast.action.run();
                        setToast(null);
                      }}
                    >
                      {toast.action.label}
                    </button>
                  )}
                  <button
                    className="btn icon sm"
                    style={{ borderColor: "transparent", color: "#fff" }}
                    onClick={() => setToast(null)}
                  >
                    <Ic.X />
                  </button>
                </div>
              )}
              {window.DriverUI?.AdminConfirmBridge ? (
                <window.DriverUI.AdminConfirmBridge />
              ) : null}
            </div>
          </div>
        );
      }

      // =====================================================================
      // SHELL
      // =====================================================================
      function App() {
        const store = useAuthStore();
        const [view, setView] = useState("driver"); // driver | admin
        const [theme, setTheme] = useState(
          localStorage.getItem("autheon-theme") || "light",
        );
        const { locale, setLocale, t } = useI18n();
        const pwaHref = resolvePwaHref();

        useEffect(() => {
          document.documentElement.setAttribute("data-theme", theme);
          localStorage.setItem("autheon-theme", theme);
        }, [theme]);

        return (
          <div className="app">
            <header className="app-header">
              <div className="brand">
                <img
                  className="brand-mark"
                  src="favicon.svg"
                  alt=""
                  width="22"
                  height="22"
                  aria-hidden="true"
                />
                <span>{store.getAppDisplayName()}</span>
                <span style={{ opacity: 0.45, marginLeft: 6, fontWeight: 400 }}>
                  · {t("appTitle")}
                </span>
              </div>
              <div className="app-controls">
                <div className="switcher">
                  <button
                    className={view === "driver" ? "on" : ""}
                    onClick={() => setView("driver")}
                  >
                    {t("driverPwa")}
                  </button>
                  <button
                    className={view === "admin" ? "on" : ""}
                    onClick={() => setView("admin")}
                  >
                    {t("adminBackend")}
                  </button>
                </div>
                <a
                  className="pwa-entry"
                  href={pwaHref}
                  target="_top"
                  rel="noopener"
                  title={t("openPwaViewportTitle")}
                  onClick={(e) => openPwaSurface(e, t)}
                >
                  {t("openPwaViewport")}
                </a>
                <div className="switcher locale-switch">
                  <button
                    className={locale === "en" ? "on" : ""}
                    onClick={() => setLocale("en")}
                  >
                    EN
                  </button>
                  <button
                    className={locale === "de" ? "on" : ""}
                    onClick={() => setLocale("de")}
                  >
                    DE
                  </button>
                </div>
                <div className="switcher theme-switch">
                  <button
                    className={theme === "light" ? "on" : ""}
                    onClick={() => setTheme("light")}
                  >
                    {t("themeLight")}
                  </button>
                  <button
                    className={theme === "dark" ? "on" : ""}
                    onClick={() => setTheme("dark")}
                  >
                    {t("themeDark")}
                  </button>
                </div>
              </div>
              <div className="right">
                <span>v1.0 · {t("clientPreview")}</span>
                <span className="demo-tag">{t("mockData")}</span>
              </div>
            </header>
            <main className="app-stage">
              {view === "driver" ? <DriverApp /> : <AdminApp />}
            </main>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
